<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 YT to MP4 Downloader Super Cepat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Mengubah warna scrollbar biar serasi */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center font-sans p-4">

    <div class="max-w-xl w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 text-center">
        <h1 class="text-3xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-orange-500">
            🎬 YouTube to MP4
        </h1>
        <p class="text-slate-400 text-sm mb-8">Download video YouTube favoritmu dengan kualitas tinggi secara gratis.</p>

        <div class="space-y-4">
            <div class="relative">
                <input type="text" id="video-url" placeholder="Tempel link YouTube di sini..." 
                       class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-4 px-5 pr-12 text-white placeholder-slate-500 focus:outline-none focus:border-red-500 transition-all">
                <i class="fab fa-youtube absolute right-4 top-5 text-2xl text-slate-600"></i>
            </div>
            
            <button id="btn-fetch" class="w-full bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 font-bold py-4 rounded-2xl transition-all shadow-lg flex justify-center items-center gap-2">
                <span>Proses Video</span> <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <div id="result-box" class="hidden mt-8 p-4 bg-slate-900 rounded-2xl border border-slate-700 text-left">
            <div id="loading" class="hidden text-center py-4">
                <i class="fas fa-spinner animate-spin text-red-500 text-3xl mb-2"></i>
                <p class="text-sm text-slate-400">Sedang menganalisis video...</p>
            </div>

            <div id="video-details" class="hidden space-y-4">
                <img id="video-thumb" src="" alt="Thumbnail" class="w-full rounded-xl object-cover shadow-md">
                <h3 id="video-title" class="font-bold text-slate-200 line-clamp-2">Judul Video</h3>
                <a id="btn-download" href="#" target="_blank" class="w-full block text-center bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition-all shadow-md">
                    <i class="fas fa-download mr-1"></i> Unduh MP4 Sekarang
                </a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
